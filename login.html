<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DocuRent - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-container w-100">
            <div class="row g-0">

                <div class="col-md-6 d-none d-md-block">
                    <div class="image-box h-100">
                        <img src="assets/camera-login.jpg" alt="Illustration">
                    </div>
                </div>

                <div class="col-12 col-md-6 p-4 p-md-5">
                    <h3 class="fw-bold mb-2">Masuk ke Akun Anda</h3>
                    <p class="text-muted mb-4">
                        Selamat datang kembali!
                    </p>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Masukkan email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="Masukkan password">
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label small">
                                    Ingat saya
                                </label>
                            </div>
                            <a href="#" class="forgot-password text-dark">
                                Lupa Password
                            </a>
                        </div>

                        <a href="index.html" class="btn btn-dark w-100 mb-3">
                            Log In
                        </a>

                        <button type="button"
                            class="btn btn-google w-100 mb-4 d-flex align-items-center justify-content-center">
                            <img src="assets/google.png" alt="Google" height="20" class="me-2">
                            Log In dengan Google
                        </button>

                        <p class="text-center small">
                            Belum punya akun?
                            <a href="#" class="fw-bold text-dark">Daftar</a>
                        </p>
                    </form>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
